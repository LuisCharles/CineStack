<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStack | Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="mesh-gradient"></div>

<div id="tela-login" class="container d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="glass-card p-5 text-center" style="max-width: 420px; width: 100%;">
        <h1 class="logo-silver mb-4">CINESTACK<span>.</span></h1>
        <div id="alerta-auth" class="alert mb-3 p-2 small" style="display: none; background: rgba(220, 53, 69, 0.2); border: 1px solid #dc3545; color: white;"></div>
        <div id="form-auth">
            <h5 id="auth-titulo" class="text-white mb-4">Acessar Biblioteca</h5>
            <div id="campo-nome-real" class="mb-3" style="display: none;">
                <input type="text" id="regNomeReal" class="search-input w-100" placeholder="Seu Nome Completo">
            </div>
            <div class="mb-3">
                <input type="text" id="userAuth" class="search-input w-100" placeholder="Usuário">
            </div>
            <div class="mb-4">
                <input type="password" id="passAuth" class="search-input w-100" placeholder="Senha">
            </div>
            <button id="btn-auth" class="btn-action-add w-100" onclick="autenticar()">ENTRAR</button>
            <p class="mt-4 small text-white">
                <span id="auth-pergunta" class="opacity-50">Não tem conta?</span> 
                <a href="javascript:void(0)" onclick="alternarModoAuth()" id="auth-link" class="text-white fw-bold text-decoration-none ms-1">Cadastre-se</a>
            </p>
        </div>
    </div>
</div>

<div id="app-catalogo" style="display: none;">
    
    <nav class="navbar fixed-top glass-nav px-4">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <span class="logo-silver" onclick="logout()">CINESTACK<span>.</span></span>
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Pesquisar novo filme..." oninput="buscarNoJava()">
                <ul id="listaResultados" class="search-dropdown-results"></ul>
            </div>
        </div>
    </nav>

    <main class="container content-wrapper">
        
        <div class="d-flex gap-3 mb-5 border-bottom border-secondary pb-3">
            <button id="btn-aba-biblioteca" class="tab-btn active" onclick="mudarAba('biblioteca')">Minha Biblioteca</button>
            <button id="btn-aba-descobrir" class="tab-btn" onclick="mudarAba('descobrir')">🌍 Descobrir</button>
        </div>

        <div id="secao-biblioteca">
            <div id="header-dynamic"></div>
            <div class="filter-bar" id="barra-filtros" style="display: none;">
                <button class="filter-pill active" onclick="aplicarFiltro('todos', this)">Todos os Filmes</button>
                <button class="filter-pill" onclick="aplicarFiltro('recentes', this)">🆕 Últimos Adicionados</button>
                <button class="filter-pill" onclick="aplicarFiltro('favoritos', this)">⭐ Apenas Favoritos</button>
                <button class="filter-pill" onclick="aplicarFiltro('nao-vistos', this)">⏳ Para Ver</button>
                <button class="filter-pill" onclick="aplicarFiltro('vistos', this)">👁️ Já Vistos</button>
            </div>
            <div class="movie-grid" id="gridFilmes"></div>
        </div>

        <div id="secao-descobrir" style="display: none;">
            <div class="mb-5 border-start border-4 border-purple ps-4">
                <h1 class="fw-bold display-4 hero-title text-white">Aba <span class="text-purple-gradient">Descobrir</span></h1>
                <p class="text-white opacity-75">Encontre novos filmes em alta, lançamentos e os mais bem avaliados.</p>
            </div>
            <div class="filter-bar">
                <button class="filter-pill-descobrir active" onclick="aplicarFiltroDescobrir('popular', this)">🔥 Em Alta</button>
                <button class="filter-pill-descobrir" onclick="aplicarFiltroDescobrir('top_rated', this)">🏆 Mais Votados</button>
                <button class="filter-pill-descobrir" onclick="aplicarFiltroDescobrir('upcoming', this)">📅 Lançamentos</button>
            </div>
            <div class="movie-grid" id="gridDescobrir"></div>
            <div id="paginacao-descobrir" class="d-flex justify-content-center flex-wrap gap-2 mt-5 mb-4"></div>
        </div>

    </main>
</div>

<div class="modal fade" id="modalFilme" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-xl">
        <div class="modal-content glass-card-detail border-0">
            <div class="modal-body p-0 position-relative">
                <button type="button" class="btn-close-neon" data-bs-dismiss="modal">&times;</button>
                <div class="row g-0">
                    <div class="col-lg-5">
                        <img id="modal-foto" src="" class="img-fluid h-100 w-100 object-fit-cover" style="border-radius: 30px 0 0 30px;">
                    </div>
                    <div class="col-lg-7 p-5 text-white">
                        <h1 id="modal-titulo" class="display-4 fw-bold mb-2"></h1>
                        <div class="meta-tags mb-4 d-flex gap-3">
                            <span id="modal-ano" class="tag-badge"></span>
                            <span id="modal-nota" class="tag-badge gold"></span>
                            <span class="tag-badge tomato d-flex align-items-center gap-2">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/5/5b/Rotten_Tomatoes.svg" width="20">
                                <span id="modal-tomato">--%</span>
                            </span>
                        </div>
                        <h6 class="label-purple">SINOPSE</h6>
                        <p id="modal-sinopse" class="sinopse-text"></p>
                        <h6 class="label-purple mt-4">ELENCO PRINCIPAL</h6>
                        <div id="modal-elenco" class="d-flex flex-wrap gap-2"></div>
                        
                        <div class="mt-5 d-flex flex-column gap-2">
                            <div id="modal-footer-actions"></div>
                            <a id="modal-trailer" href="#" target="_blank" class="btn-action-trailer w-100 text-center text-decoration-none" style="display: none;">
                                <i class="fab fa-youtube me-2"></i> ASSISTIR TRAILER
                            </a>
                        </div>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/scripts.js"></script>
</body>
</html>
