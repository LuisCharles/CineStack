# Define a porta do servidor Java
server.port=${PORT:8080}

# Configuração do Banco de Dados em Memória (H2)
spring.datasource.url=jdbc:h2:mem:cinestackdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Permite aceder ao painel do banco de dados no navegador
spring.h2.console.enabled=true

# 'create' faz o Java apagar e recriar o banco sempre que inicia,
# o que OBRIGA o import.sql a ser executado!
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create

spring.sql.init.mode=always