# Porta dinâmica para o Render
server.port=${PORT:8080}

# Configuração do Banco H2 em Memória
spring.datasource.url=jdbc:h2:mem:cinestackdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console do H2 (acesso local: /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Estratégia do Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create

# Forçar a execução do import.sql no deploy
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Logs para debug no painel do Render
spring.jpa.show-sql=true
spring.jpa.open-in-view=false