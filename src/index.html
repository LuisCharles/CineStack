<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CineStack - Meu Catálogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; padding: 20px; }
        .card { background-color: #1e1e1e; color: white; border: 1px solid #333; }
        .form-control { background-color: #2b2b2b; color: white; border: 1px solid #444; }
        .form-control:focus { background-color: #333; color: white; border-color: #0d6efd; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">🎬 CineStack API</h1>
        
        <div class="card p-4 mb-4">
            <h4>Cadastrar Novo Filme</h4>
            <div class="row g-3">
                <div class="col-md-4"><input type="text" id="titulo" class="form-control" placeholder="Título"></div>
                <div class="col-md-2"><input type="number" id="ano" class="form-control" placeholder="Ano"></div>
                <div class="col-md-2"><input type="number" id="nota" class="form-control" placeholder="Nota" step="0.1"></div>
                <div class="col-md-4"><input type="text" id="sinopse" class="form-control" placeholder="Sinopse"></div>
                <div class="col-12"><button onclick="cadastrar()" class="btn btn-primary w-100">Salvar Filme</button></div>
            </div>
        </div>

        <table class="table table-dark table-hover">
            <thead>
                <tr>
                    <th>Título</th>
                    <th>Ano</th>
                    <th>Nota</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaFilmes"></tbody>
        </table>
    </div>

    <script>
        const API_URL = "http://localhost:8082/filmes";

        async function listar() {
            const res = await fetch(API_URL);
            const filmes = await res.json();
            const lista = document.getElementById("listaFilmes");
            lista.innerHTML = filmes.map(f => `
                <tr>
                    <td>${f.titulo}</td>
                    <td>${f.anoLancamento}</td>
                    <td>${f.nota}</td>
                    <td><button onclick="deletar(${f.id})" class="btn btn-danger btn-sm">Apagar</button></td>
                </tr>
            `).join("");
        }

        async function cadastrar() {
            const filme = {
                titulo: document.getElementById('titulo').value,
                anoLancamento: document.getElementById('ano').value,
                nota: document.getElementById('nota').value,
                sinopse: document.getElementById('sinopse').value
            };
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(filme)
            });
            listar();
        }

        async function deletar(id) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            listar();
        }

        listar(); 
    </script>
</body>
</html>
